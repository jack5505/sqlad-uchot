services:
  db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-warehouse}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-warehouse}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      FLASK_DEBUG: "0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
